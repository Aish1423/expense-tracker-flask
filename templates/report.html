{% extends "base.html" %}

{% block content %}

<!-- MAIN PAGE -->

<div class="min-h-screen p-5 relative overflow-hidden">

    <!-- BACKGROUND -->

    <div class="absolute inset-0 bg-gray-950"></div>

    <!-- BLUR EFFECT -->

    <div class="absolute top-10 left-10 w-72 h-72 bg-pink-500 blur-3xl opacity-20 rounded-full"></div>

    <div class="absolute bottom-10 right-10 w-72 h-72 bg-blue-500 blur-3xl opacity-20 rounded-full"></div>

    <!-- CONTENT -->

    <div class="relative z-10">

        <!-- PAGE TITLE -->

        <h1 class="text-3xl md:text-5xl font-bold text-white mb-10">

            📊 Reports Dashboard

        </h1>

        <!-- REPORT CARDS -->

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

            <!-- INCOME CARD -->

            <div class="bg-white/5 border border-white/10 rounded-3xl p-6 backdrop-blur-xl">

                <h2 class="text-2xl font-bold text-green-400">

                    Total Income

                </h2>

                <p class="text-4xl font-bold text-white mt-5">

                    ₹ {{ income }}

                </p>

            </div>

            <!-- EXPENSE CARD -->

            <div class="bg-white/5 border border-white/10 rounded-3xl p-6 backdrop-blur-xl">

                <h2 class="text-2xl font-bold text-red-400">

                    Total Expense

                </h2>

                <p class="text-4xl font-bold text-white mt-5">

                    ₹ {{ expense }}

                </p>

            </div>

            <!-- SAVINGS CARD -->

            <div class="bg-white/5 border border-white/10 rounded-3xl p-6 backdrop-blur-xl">

                <h2 class="text-2xl font-bold text-blue-400">

                    Total Savings

                </h2>

                <p class="text-4xl font-bold text-white mt-5">

                    ₹ {{ savings }}

                </p>

            </div>

        </div>

        <!-- CHART SECTION -->

        <div class="mt-12 bg-white/5 border border-white/10 rounded-3xl p-6 backdrop-blur-xl">

            <h2 class="text-3xl font-bold text-pink-400 mb-8">

                Expense Analytics

            </h2>

            <!-- CHART -->

            <div class="w-full max-w-md sm:max-w-lg md:max-w-2xl h-[300px] sm:h-[400px] mx-auto">

                <canvas id="expenseChart"></canvas>

            </div>

        </div>

        <!-- BACK BUTTON -->

        <div class="mt-10">

            <button onclick="navigate('/')"
                class="bg-pink-500 hover:bg-pink-700 px-6 py-4 rounded-2xl font-bold transition duration-300">

                Back to Dashboard

            </button>

        </div>

    </div>

</div>

<!-- CHART LIBRARY -->

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- CHART SCRIPT -->

<script>

    // GET CHART AREA

    const ctx = document.getElementById("expenseChart");

    // CREATE CHART

    new Chart(ctx, {

        // CHART TYPE

        type: "doughnut",

        // DATA

        data: {

            // LABELS

            labels: [

                "Income",

                "Expense",

                "Savings"

            ],

            // VALUES

            datasets: [{

                data: [

                    parseInt("{{ income }}"),

                    parseInt("{{ expense }}"),

                    parseInt("{{ savings }}")

                ],

                // COLORS

                backgroundColor: [

                    "#22c55e",

                    "#ef4444",

                    "#3b82f6"

                ]

            }]

        },

        // OPTIONS

        options: {

            responsive: true,

            maintainAspectRatio: false

        }

    });

</script>

{% endblock %}
