<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Transaction</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center p-5">

    <div class="bg-gray-900 p-10 rounded-3xl shadow-2xl w-full max-w-lg">

        <h1 class="text-4xl font-bold text-pink-500 mb-8 text-center">

            Edit Transaction

        </h1>

        <form method="POST" class="space-y-5">

            <!-- DATE -->

            <input type="date" name="date" value="{{ transaction[0] }}" class="w-full p-4 rounded-2xl bg-gray-800">

            <!-- AMOUNT -->

            <input type="number" name="amount" value="{{ transaction[1] }}" class="w-full p-4 rounded-2xl bg-gray-800">

            <!-- CATEGORY -->

            <input type="text" name="category" value="{{ transaction[2] }}" class="w-full p-4 rounded-2xl bg-gray-800">

            <!-- TYPE -->

            <select name="type" class="w-full p-4 rounded-2xl bg-gray-800">

                <option value="income">

                    Income

                </option>

                <option value="expense">

                    Expense

                </option>

            </select>

            <!-- BUTTON -->

            <button class="w-full bg-blue-500 hover:bg-blue-700 p-4 rounded-2xl font-bold">

                Update Transaction

            </button>

        </form>

    </div>

</body>

</html>
