<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Transaction</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="min-h-screen bg-gray-950 flex items-center justify-center px-4">

    <div
        class="w-full max-w-lg bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-8 shadow-2xl text-white">

        <h1 class="text-4xl font-bold mb-8 text-center">

            Edit Transaction

        </h1>

        <form method="POST" onsubmit="showLoader()" class="space-y-5">

            <input type="date" name="date" value="{{ transaction.date }}" required
                class="w-full p-4 rounded-2xl bg-white/10 outline-none">

            <input type="number" name="amount" value="{{ transaction.amount }}" required
                class="w-full p-4 rounded-2xl bg-white/10 outline-none">

            <input type="text" name="category" value="{{ transaction.category }}" required
                class="w-full p-4 rounded-2xl bg-white/10 outline-none">

            <select name="type" class="w-full p-4 rounded-2xl bg-white/10 outline-none">

                <option value="income" {% if transaction.type=="income" %}selected{% endif %}>

                    Income

                </option>

                <option value="expense" {% if transaction.type=="expense" %}selected{% endif %}>

                    Expense

                </option>

            </select>

            <button type="submit"
                class="w-full bg-blue-500 hover:bg-blue-700 p-4 rounded-2xl font-bold transition duration-300">

                Update Transaction

            </button>

        </form>



    </div>

</body>

</html>
