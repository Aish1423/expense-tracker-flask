{% extends "base.html" %}

{% block content %}

<!-- MAIN CONTAINER -->

<div class="min-h-screen flex items-center justify-center relative overflow-hidden px-4 py-8">

    <!-- BACKGROUND -->

    <div class="absolute inset-0 bg-gray-950">

    </div>

    <!-- SOFT BLUR EFFECT -->

    <div
        class="absolute top-10 left-10 sm:top-20 sm:left-20 w-52 sm:w-72 h-52 sm:h-72 bg-pink-500 rounded-full blur-3xl opacity-20">

    </div>

    <div
        class="absolute bottom-10 right-10 sm:bottom-20 sm:right-20 w-52 sm:w-72 h-52 sm:h-72 bg-blue-500 rounded-full blur-3xl opacity-20">

    </div>

    <!-- GLASS CARD -->

    <div
        class="relative z-10 backdrop-blur-xl bg-white/5 border border-white/10 shadow-2xl rounded-[25px] sm:rounded-[35px] p-5 sm:p-6 md:p-8 w-full max-w-md">

        <!-- TITLE -->

        <h1 class="text-2xl sm:text-3xl md:text-4xl font-bold text-white text-center mb-8 md:mb-10">

            Add Transaction

        </h1>

        <!-- FORM -->

        <form id="transactionForm" method="POST" action="/add" class="space-y-4">

            <!-- DATE -->

            <div class="relative">

                <input type="date" name="date" required
                    class="w-full p-3 rounded-2xl bg-white/10 text-white outline-none border border-white/10">

            </div>

            <!-- AMOUNT -->

            <input type="number" name="amount" placeholder="Enter Amount" required
                class="w-full p-3 rounded-2xl bg-white/10 text-white placeholder-gray-300 outline-none border border-white/10">

            <!-- CATEGORY -->

            <input type="text" name="category" placeholder="Enter Category" required
                class="w-full p-3 rounded-2xl bg-white/10 text-white placeholder-gray-300 outline-none border border-white/10">

            <!-- TYPE -->

            <select name="type"
                class="w-full p-3 rounded-2xl bg-white/10 text-white outline-none border border-white/10">

                <option value="income" class="text-black">

                    Income

                </option>

                <option value="expense" class="text-black">

                    Expense

                </option>

            </select>

            <!-- ADD BUTTON -->

            <button type="submit"
                class="w-full bg-white text-purple-700 hover:bg-pink-500 hover:text-white transition duration-300 p-3 rounded-2xl font-bold text-base sm:text-lg shadow-2xl">

                Add Transaction

            </button>

            <!-- BACK BUTTON -->

            <button type="button" onclick="navigate('/')"
                class="w-full bg-pink-500 hover:bg-pink-700 px-6 py-3 sm:py-4 rounded-2xl font-bold transition duration-300">

                Back to Dashboard

            </button>

        </form>

    </div>

</div>

<!-- DATE INPUT FIX -->

<style>
    input[type="date"]::-webkit-calendar-picker-indicator {

        filter: invert(1);

        cursor: pointer;

    }
</style>

<!-- FORM SCRIPT -->

<script>

    const form = document.getElementById("transactionForm");

    form.addEventListener("submit", function (event) {

        event.preventDefault();

        // SHOW LOADER

        showLoader();

        // WAIT

        setTimeout(() => {

            // HIDE LOADER

            hideLoader();

            // SHOW TOAST

            showToast(
                "Transaction Added Successfully ✅",
                "green"
            );

            // SUBMIT FORM

            setTimeout(() => {

                form.submit();

            }, 1000);

        }, 1200);

    });

</script>

{% endblock %}
